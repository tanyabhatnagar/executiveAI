version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: promptos_db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres_secure_pass
      POSTGRES_DB: promptos
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d promptos"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: promptos_backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - /app/node_modules # avoid conflicts if any, though Python doesn't use node_modules, wait, python directory mounts everything
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres_secure_pass@postgres:5432/promptos
      - SECRET_KEY=3ec661fae4e5cfbd05c317a61d76378e906353d26210f63e69123b361a6813bf
      - ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=60
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: promptos_frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend

volumes:
  postgres_data:
